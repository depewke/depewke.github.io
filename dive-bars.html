<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg" href="sax-icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dive Bar Sessions | Claude Gerstenhauber</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --text-gray: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('night-sax.jpg') center/cover no-repeat fixed;
            color: white;
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        h1, h2 { font-family: 'Playfair Display', serif; }

        .neon-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            animation: flicker 4s infinite alternate;
        }

        @keyframes flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.7; text-shadow: none; }
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 10%;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-link {
            color: var(--neon-magenta);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .container {
            padding: 120px 10% 60px 10%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        /* Photo Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid #333;
            transition: 0.4s ease;
            aspect-ratio: 4/5;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(110%);
            transition: 0.5s ease;
        }

        .gallery-item:hover {
            border-color: var(--neon-cyan);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .gallery-item:hover img {
            filter: grayscale(0%) contrast(100%);
        }

        .caption-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: 0.3s;
        }

        .gallery-item:hover .caption-overlay {
            opacity: 1;
        }

        footer {
            text-align: center;
            padding: 50px;
            border-top: 1px solid #222;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" style="letter-spacing: 5px; font-weight: 700; border: 1px solid white; padding: 5px 15px;">CLAUDE</div>
        <a href="index.html" class="back-link">← Return to Shadows</a>
    </nav>

    <div class="container">
        <div class="gallery-header">
            <h1 class="neon-text">Dive Bar Sessions</h1>
            <p>The grit, the smoke, and the midnight neon.</p>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="dive1.jpg" alt="Claude in a smoky bar">
                <div class="caption-overlay">The Blue Note Lounge, 2:00 AM</div>
            </div>

            <div class="gallery-item">
                <img src="dive2.jpg" alt="Saxophone on a bar counter">
                <div class="caption-overlay">Varnish & Velvet</div>
            </div>

            <div class="gallery-item">
                <img src="dive3.jpg" alt="Claude playing for a small crowd">
                <div class="caption-overlay">Neon Reflections</div>
            </div>

            <div class="gallery-item">
                <img src="dive4.jpg" alt="Close up of the tenor sax">
                <div class="caption-overlay">Brass & Shadow</div>
            </div>
            
            </div>
    </div>

    <footer>
        <p>&copy; 2024 Claude Gerstenhauber | Dive Bar Archive</p>
    </footer>

</body>
</html>
