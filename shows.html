<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="yacht-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Dates | Diamond Rock Monument</title>
    <style>
        :root {
            --gold: #d4af37;
            --ocean-blue: #0077be;
            --cream: #fdf5e6;
            --navy: #001f3f;
            --sunset-orange: #ff8c00;
            --yacht-white: #ffffff;
            --card-beige: #e5dfd3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cream);
            color: var(--navy);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(rgba(0,31,63,0.85), rgba(0,31,63,0.85)), url('header-bg.jpg') center/cover;
            color: white;
            text-align: center;
            padding: 60px 20px;
            border-bottom: 8px solid var(--gold);
        }

        h1 { font-family: 'Georgia', serif; text-transform: uppercase; font-size: 3rem; margin: 0; letter-spacing: 3px; }

        nav {
            background: var(--navy);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: var(--sunset-orange); }

        .container { max-width: 1100px; margin: auto; padding: 40px 20px; }

        .tour-section { margin-bottom: 20px; }

        /* Hiding Logic */
        .shows-grid.hidden { display: none; }

        .region-banner {
            background-color: #f1f1f1;
            padding: 15px 20px;
            border: 1px solid #ddd;
            font-family: 'Georgia', serif;
            font-weight: bold;
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            position: relative; 
            overflow: hidden;
        }

        .region-banner.active { background-color: var(--card-beige); border-bottom: none; }

        .shows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            background: #f9f9f9;
            padding: 25px;
            border: 1px solid #ddd;
        }

        .show-card {
            display: flex;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .show-card:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--gold);
        }

        .date-block {
            background-color: var(--card-beige);
            min-width: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #ccc;
        }

        .date-block .day { font-size: 2.5rem; font-weight: bold; color: var(--navy); line-height: 1; }
        .date-block .month { text-transform: uppercase; font-weight: bold; color: #666; font-size: 0.9rem; }

        .details-block { padding: 20px; flex-grow: 1; }
        .details-block h3 { margin: 0 0 5px 0; color: var(--ocean-blue); font-size: 1.2rem; }
        .details-block p { margin: 2px 0; font-size: 0.9rem; color: #444; }

        .ticket-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--sunset-orange);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

            right: 20px;
